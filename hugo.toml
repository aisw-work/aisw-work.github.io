baseURL = 'https://aisw-work.github.io/'
languageCode = 'ko'
title = "Naps's Blog"
theme = 'PaperMod'
paginate = 10
enableRobotsTXT = true

[params]
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowToc = false
  homeInfoParams = {Title = "Naps's Blog", Content = "매일 업데이트되는 AI/ML 뉴스와 네이버 인기 상품 다이제스트입니다."}

[taxonomies]
  category = 'categories'
  tag = 'tags'

[markup.goldmark.renderer]
  unsafe = true
